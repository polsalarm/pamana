<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pamana - Cash Out</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-primary-fixed": "#002117",
                        "on-tertiary-fixed-variant": "#404758",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#dce2f7",
                        "on-secondary-container": "#684000",
                        "primary-fixed-dim": "#95d3ba",
                        "inverse-on-surface": "#f2f1ee",
                        "on-primary-fixed-variant": "#0b513d",
                        "outline": "#707974",
                        "tertiary": "#272e3e",
                        "tertiary-fixed-dim": "#c0c6db",
                        "surface-container-low": "#f4f3f1",
                        "primary-fixed": "#b0f0d6",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {

                    "spacing": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased pb-24 md:pb-0">
<!-- Top App Bar (Task-focused, suppressed nav) -->
<header class="docked full-width top-0 z-50 bg-surface dark:bg-on-primary-fixed flex justify-between items-center px-container-margin h-16 max-w-[600px] mx-auto w-full">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Cash Out</h1>
</div>
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-xl">shield</span>
<span class="font-label-md text-label-md">Powered by PDAX</span>
</div>
</header>
<main class="max-w-[600px] mx-auto px-container-margin pt-xl space-y-xl">
<!-- Conversion Header -->
<section class="text-center space-y-md">
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Available to Withdraw</p>
<div class="flex flex-col items-center">
<div class="flex items-baseline gap-2">
<span class="font-price-display text-price-display text-primary">350</span>
<span class="font-headline-md text-headline-md text-primary/70">USDC</span>
</div>
<div class="mt-xs text-secondary-container font-headline-md text-headline-md font-bold">
                    ≈ ₱20,020
                </div>
</div>
<div class="inline-flex items-center gap-2 bg-surface-container py-2 px-4 rounded-full font-label-md text-label-md text-on-surface-variant border border-surface-variant">
<span class="material-symbols-outlined text-[18px]">currency_exchange</span>
<span>Rate: 1 USDC = ₱57.20</span>
<div class="w-2 h-2 rounded-full bg-primary-container shadow-[0_0_8px_rgba(6,78,59,0.5)] animate-pulse ml-2"></div>
</div>
</section>
<!-- Payout Options Grid -->
<section class="space-y-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Select Payout Method</h2>
<div class="grid gap-md">
<!-- GCash Option (Selected) -->
<label class="relative flex items-center p-lg bg-surface border-2 border-primary-container rounded-[24px] cursor-pointer shadow-[0_10px_30px_rgba(6,78,59,0.05)] transition-all">
<input checked="" class="sr-only" name="payout_method" type="radio" value="gcash"/>
<div class="absolute inset-0 rounded-[24px] bg-primary-container/[0.03] pointer-events-none"></div>
<div class="w-12 h-12 rounded-full bg-[#007FFF]/10 flex items-center justify-center text-[#007FFF] mr-md shrink-0">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="flex-grow">
<div class="font-headline-md text-headline-md text-on-surface text-[20px] leading-tight">GCash</div>
<div class="font-body-md text-body-md text-on-surface-variant text-[14px]">Instant transfer • Fee: ₱15</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary-container flex items-center justify-center ml-md">
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
</div>
</label>
<!-- Maya Option -->
<label class="relative flex items-center p-lg bg-surface border-2 border-transparent hover:border-surface-variant rounded-[24px] cursor-pointer shadow-sm transition-all">
<input class="sr-only" name="payout_method" type="radio" value="maya"/>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant mr-md shrink-0">
<span class="material-symbols-outlined text-[28px]">payments</span>
</div>
<div class="flex-grow">
<div class="font-headline-md text-headline-md text-on-surface text-[20px] leading-tight">Maya</div>
<div class="font-body-md text-body-md text-on-surface-variant text-[14px]">Instant transfer • Fee: ₱15</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant ml-md"></div>
</label>
<!-- Bank Transfer Option -->
<label class="relative flex items-center p-lg bg-surface border-2 border-transparent hover:border-surface-variant rounded-[24px] cursor-pointer shadow-sm transition-all">
<input class="sr-only" name="payout_method" type="radio" value="bank"/>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant mr-md shrink-0">
<span class="material-symbols-outlined text-[28px]">account_balance</span>
</div>
<div class="flex-grow">
<div class="font-headline-md text-headline-md text-on-surface text-[20px] leading-tight">Bank Transfer</div>
<div class="font-body-md text-body-md text-on-surface-variant text-[14px]">InstaPay (Real-time) • Fee: ₱25</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant ml-md"></div>
</label>
</div>
</section>
<!-- Summary & Action -->
<section class="pt-md pb-xl">
<div class="bg-surface-container-low rounded-[24px] p-lg space-y-sm mb-lg">
<div class="flex justify-between font-body-md text-body-md text-on-surface">
<span>Amount to receive</span>
<span class="font-bold">₱20,020</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant text-[14px]">
<span>Network Fee</span>
<span>-₱15</span>
</div>
<hr class="border-surface-variant my-sm"/>
<div class="flex justify-between font-headline-md text-headline-md text-[20px] text-primary">
<span>Total Payout</span>
<span class="font-bold">₱20,005</span>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary min-h-[56px] rounded-full font-label-md text-label-md text-[18px] flex items-center justify-center gap-2 shadow-[0_10px_30px_rgba(6,78,59,0.2)] hover:opacity-90 active:scale-95 transition-all">
                Withdraw to GCash
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<p class="text-center font-body-md text-body-md text-on-surface-variant text-[12px] mt-md">
                By withdrawing, you agree to PDAX's Terms of Service.
            </p>
</section>
</main>
<script>
        // Simple script to handle radio button styling selection
        document.querySelectorAll('input[name="payout_method"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Reset all labels
                document.querySelectorAll('label:has(input[name="payout_method"])').forEach(label => {
                    label.classList.remove('border-primary-container', 'shadow-[0_10px_30px_rgba(6,78,59,0.05)]');
                    label.classList.add('border-transparent');
                    
                    // Reset indicator
                    const indicator = label.querySelector('.w-6.h-6');
                    indicator.classList.remove('border-primary-container');
                    indicator.classList.add('border-outline-variant');
                    indicator.innerHTML = '';
                    
                    // Remove highlight background
                    const bg = label.querySelector('.absolute.inset-0');
                    if(bg) bg.remove();
                });

                // Style selected label
                const selectedLabel = e.target.closest('label');
                selectedLabel.classList.remove('border-transparent');
                selectedLabel.classList.add('border-primary-container', 'shadow-[0_10px_30px_rgba(6,78,59,0.05)]');
                
                // Style selected indicator
                const indicator = selectedLabel.querySelector('.w-6.h-6');
                indicator.classList.remove('border-outline-variant');
                indicator.classList.add('border-primary-container');
                indicator.innerHTML = '<div class="w-3 h-3 rounded-full bg-primary-container"></div>';
                
                // Add highlight background
                selectedLabel.insertAdjacentHTML('afterbegin', '<div class="absolute inset-0 rounded-[24px] bg-primary-container/[0.03] pointer-events-none"></div>');
                
                // Update button text based on selection
                const btn = document.querySelector('button.w-full');
                const methodText = e.target.value === 'gcash' ? 'GCash' : e.target.value === 'maya' ? 'Maya' : 'Bank';
                btn.innerHTML = `Withdraw to ${methodText} <span class="material-symbols-outlined text-[20px]">arrow_forward</span>`;
            });
        });
    </script>
</body></html>

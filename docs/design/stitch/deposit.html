<body class="bg-surface-container-low text-on-surface antialiased font-body-md flex justify-center min-h-screen">
<!-- Mobile App Container -->
<main class="w-full max-w-[600px] bg-surface min-h-screen flex flex-col relative overflow-hidden shadow-2xl shadow-primary/5">
<!-- Transactional Header (Suppressed BottomNav & standard TopAppBar due to task focus) -->
<header class="flex justify-between items-center px-container-margin h-16 w-full z-10 bg-surface">
<button class="w-10 h-10 flex items-center justify-start text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-label-md text-label-md text-on-surface tracking-wide">DEPOSIT</h1>
<div class="w-10 h-10 flex items-center justify-end">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">help</span>
</div>
</header>
<!-- Main Content Canvas -->
<div class="flex-grow flex flex-col items-center justify-between pt-4 pb-8 w-full z-10">
<!-- Vault Info & Amount Display -->
<div class="flex flex-col items-center w-full px-container-margin mt-2">
<!-- Target Vault Identity -->
<div class="inline-flex items-center gap-2 bg-surface-container-low border border-outline-variant/30 px-4 py-2 rounded-full mb-8">
<div class="w-2 h-2 rounded-full bg-primary status-pulse"></div>
<span class="font-label-md text-label-md text-on-surface-variant">Funding: <span class="text-primary font-bold">Maria's Heritage</span></span>
</div>
<!-- Live Amount Display -->
<div class="flex flex-col items-center justify-center w-full min-h-[120px]">
<div class="flex items-baseline justify-center gap-1 overflow-hidden w-full">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface-variant/70 mb-2">₱</span>
<span class="font-display-lg text-display-lg text-on-surface tracking-tight truncate max-w-[90%]" id="display-php">5,000</span>
</div>
<!-- Crypto Equivalent (Glassmorphism pill) -->
<div class="mt-3 flex items-center gap-1.5 bg-surface-container-highest/40 backdrop-blur-sm px-3 py-1.5 rounded-lg border border-white/20">
<span class="material-symbols-outlined text-[16px] text-primary-container" style="font-variation-settings: 'FILL' 1;">currency_exchange</span>
<span class="font-body-md text-body-md text-on-surface-variant" id="display-usdc">≈ 87.41 USDC</span>
</div>
</div>
</div>
<!-- Custom Numeric Pad -->
<div class="w-full max-w-[360px] mx-auto px-6 mt-auto mb-8 grid grid-cols-3 gap-y-4 gap-x-6">
<!-- Row 1 -->
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="1">1</button>
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="2">2</button>
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="3">3</button>
<!-- Row 2 -->
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="4">4</button>
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="5">5</button>
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="6">6</button>
<!-- Row 3 -->

<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="8">8</button>
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="9">9</button>
<!-- Row 4 -->
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val=".">.</button>
<button class="numpad-btn h-16 rounded-2xl flex items-center justify-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface hover:bg-surface-container transition-colors active:scale-95" data-val="0">0</button>
<button class="h-16 rounded-2xl flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors active:scale-95" id="btn-backspace">
<span class="material-symbols-outlined text-[28px]">backspace</span>
</button>
</div>
<!-- Primary Action Button -->
<div class="w-full px-container-margin">
<button class="w-full h-[56px] bg-primary-container text-on-primary font-label-md text-label-md rounded-full flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-[0_10px_30px_rgba(6,78,59,0.15)] overflow-hidden relative group" id="btn-deposit">
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="relative z-10">Sign &amp; Deposit</span>
</button>
</div>
</div>
<!-- Confirmation State Overlay (Hidden by default) -->
<div class="absolute inset-0 bg-surface z-50 flex flex-col items-center justify-center px-container-margin translate-y-full transition-transform duration-500 ease-in-out" id="success-overlay">
<!-- Atmospheric background element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary-fixed-dim/20 rounded-full blur-3xl -z-10"></div>
<div class="w-24 h-24 rounded-full bg-surface-container border border-primary-fixed flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(6,78,59,0.1)] relative">
<div class="absolute inset-0 rounded-full border-2 border-primary-container border-t-transparent animate-spin hidden" id="loading-spinner"></div>
<span class="material-symbols-outlined text-[48px] text-primary-container opacity-0 scale-50 transition-all duration-500 delay-300" id="success-icon" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface text-center mb-3 opacity-0 translate-y-4 transition-all duration-500 delay-500" id="success-title">Deposit Secured</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[280px] opacity-0 translate-y-4 transition-all duration-500 delay-700" id="success-desc">
                Your funds have been successfully locked into Maria's Heritage Vault on-chain.
            </p>
<button class="mt-12 px-8 py-3 bg-transparent border border-outline-variant text-on-surface font-label-md text-label-md rounded-full hover:bg-surface-container transition-colors opacity-0 translate-y-4 transition-all duration-500 delay-1000" id="btn-return">
                Return to Dashboard
            </button>
</div>
</main>
<script>
        // Simple Interaction Logic for Demonstration
        document.addEventListener('DOMContentLoaded', () => {
            let currentAmount = "5000";
            const displayPhp = document.getElementById('display-php');
            const displayUsdc = document.getElementById('display-usdc');
            const EX_RATE = 0.017482; // Mock exchange rate

            function updateDisplay() {
                // Format PHP with commas
                const formattedNum = Number(currentAmount).toLocaleString('en-US');
                displayPhp.textContent = currentAmount === "" ? "0" : formattedNum;
                
                // Calculate Mock USDC
                const usdcVal = (Number(currentAmount) * EX_RATE).toFixed(2);
                displayUsdc.textContent = `≈ ${usdcVal} USDC`;
            }

            // Numpad clicks
            document.querySelectorAll('.numpad-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const val = e.target.getAttribute('data-val');
                    if (currentAmount.length < 8) { // Arbitrary limit
                        if (val === '.' && currentAmount.includes('.')) return;
                        if (currentAmount === "0" && val !== '.') {
                            currentAmount = val;
                        } else {
                            currentAmount += val;
                        }
                        updateDisplay();
                    }
                });
            });

            // Backspace
            document.getElementById('btn-backspace').addEventListener('click', () => {
                currentAmount = currentAmount.slice(0, -1);
                if (currentAmount === "") currentAmount = "0";
                updateDisplay();
            });

            // Deposit Action Trigger
            const depositBtn = document.getElementById('btn-deposit');
            const overlay = document.getElementById('success-overlay');
            const spinner = document.getElementById('loading-spinner');
            const successIcon = document.getElementById('success-icon');
            const successTitle = document.getElementById('success-title');
            const successDesc = document.getElementById('success-desc');
            const returnBtn = document.getElementById('btn-return');

            depositBtn.addEventListener('click', () => {
                // Change button state to "Signing..."
                depositBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[20px]">sync</span><span class="relative z-10">Signing...</span>`;
                depositBtn.classList.add('opacity-80', 'pointer-events-none');
                
                // Simulate network/wallet delay
                setTimeout(() => {
                    // Show overlay
                    overlay.classList.remove('translate-y-full');
                    
                    // Show spinner momentarily
                    spinner.classList.remove('hidden');
                    
                    // Simulate confirmation delay
                    setTimeout(() => {
                        spinner.classList.add('hidden');
                        
                        // Trigger entrance animations for success state elements
                        successIcon.classList.remove('opacity-0', 'scale-50');
                        successIcon.classList.add('opacity-100', 'scale-100');
                        
                        successTitle.classList.remove('opacity-0', 'translate-y-4');
                        successTitle.classList.add('opacity-100', 'translate-y-0');
                        
                        successDesc.classList.remove('opacity-0', 'translate-y-4');
                        successDesc.classList.add('opacity-100', 'translate-y-0');
                        
                        returnBtn.classList.remove('opacity-0', 'translate-y-4');
                        returnBtn.classList.add('opacity-100', 'translate-y-0');

                    }, 1000);
                }, 800);
            });

            // Return action
            returnBtn.addEventListener('click', () => {
                // Reset overlay
                overlay.classList.add('translate-y-full');
                
                // Reset button
                setTimeout(() => {
                    depositBtn.innerHTML = `<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div><span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">lock</span><span class="relative z-10">Sign & Deposit</span>`;
                    depositBtn.classList.remove('opacity-80', 'pointer-events-none');
                    currentAmount = "0";
                    updateDisplay();
                    
                    // Reset animation states
                    successIcon.classList.add('opacity-0', 'scale-50');
                    successIcon.classList.remove('opacity-100', 'scale-100');
                    successTitle.classList.add('opacity-0', 'translate-y-4');
                    successTitle.classList.remove('opacity-100', 'translate-y-0');
                    successDesc.classList.add('opacity-0', 'translate-y-4');
                    successDesc.classList.remove('opacity-100', 'translate-y-0');
                    returnBtn.classList.add('opacity-0', 'translate-y-4');
                    returnBtn.classList.remove('opacity-100', 'translate-y-0');
                }, 500);
            });
        });
    </script>
